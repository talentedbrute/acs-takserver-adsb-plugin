name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - develop
      - 'feature/**'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Validate Gradle wrapper
        uses: gradle/wrapper-validation-action@v2

      - name: Check code formatting
        run: |
          # Basic validation that Java files compile syntax
          find src -name "*.java" -exec javac -d /tmp/classes {} + 2>&1 || echo "Note: Full compilation requires TAK Server SDK"

      - name: Validate YAML config
        run: |
          # Check YAML syntax
          python3 -c "import yaml; yaml.safe_load(open('tak.server.plugins.AdsbPlugin.yaml'))"
