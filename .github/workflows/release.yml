name: Build and Release

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      skip_version_bump:
        description: 'Skip version bump'
        required: false
        default: 'false'
        type: boolean

permissions:
  contents: write

jobs:
  bump-version:
    runs-on: ubuntu-latest
    outputs:
      new_version: ${{ steps.bump.outputs.new_version }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Bump version
        id: bump
        if: ${{ github.event.inputs.skip_version_bump != 'true' }}
        run: |
          # Extract current version from build.gradle
          CURRENT_VERSION=$(grep "^version = " build.gradle | sed "s/version = '\(.*\)'/\1/")
          echo "Current version: $CURRENT_VERSION"

          # Parse version components
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT_VERSION"

          # Increment patch version
          NEW_PATCH=$((PATCH + 1))
          NEW_VERSION="${MAJOR}.${MINOR}.${NEW_PATCH}"
          echo "New version: $NEW_VERSION"

          # Update build.gradle
          sed -i "s/version = '${CURRENT_VERSION}'/version = '${NEW_VERSION}'/" build.gradle

          # Commit the version bump
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add build.gradle
          git commit -m "Bump version to ${NEW_VERSION} [skip ci]"
          git push

          echo "new_version=${NEW_VERSION}" >> $GITHUB_OUTPUT

      - name: Get current version (no bump)
        id: get_version
        if: ${{ github.event.inputs.skip_version_bump == 'true' }}
        run: |
          CURRENT_VERSION=$(grep "^version = " build.gradle | sed "s/version = '\(.*\)'/\1/")
          echo "new_version=${CURRENT_VERSION}" >> $GITHUB_OUTPUT

  build:
    needs: bump-version
    runs-on: ubuntu-latest
    strategy:
      matrix:
        tak_version: ['5.4', '5.5', '5.6']
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: main  # Get the latest with version bump

      - name: Pull latest changes
        run: git pull origin main

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Download TAK Server SDK JARs
        run: |
          # Create libs directory
          mkdir -p libs

          # Download SDK JARs from release assets or configured location
          # Option 1: From GitHub release assets (configure TAK_SDK_REPO secret)
          # Option 2: From direct URL (configure TAK_SDK_URL_54, TAK_SDK_URL_55, TAK_SDK_URL_56 secrets)

          # For now, check if libs are committed to repo
          if [ ! -f "libs/takserver-plugins-${{ matrix.tak_version }}"*.jar ]; then
            echo "::warning::TAK Server SDK JAR for version ${{ matrix.tak_version }} not found in libs/"
            echo "Please ensure takserver-plugins-${{ matrix.tak_version }}-*-all.jar is available"

            # If you have a download URL configured, uncomment below:
            # curl -L -o "libs/takserver-plugins-${{ matrix.tak_version }}-release-all.jar" \
            #   "${{ secrets.TAK_SDK_BASE_URL }}/takserver-plugins-${{ matrix.tak_version }}-release-all.jar"
          fi

          ls -la libs/

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build plugin for TAK Server ${{ matrix.tak_version }}
        run: |
          ./gradlew clean shadowJar -PtakVersion=${{ matrix.tak_version }}

      - name: Get version
        id: version
        run: |
          VERSION=$(grep "^version = " build.gradle | sed "s/version = '\(.*\)'/\1/")
          echo "version=${VERSION}" >> $GITHUB_OUTPUT

      - name: Create installer package
        run: |
          VERSION=${{ steps.version.outputs.version }}
          TAK_VERSION=${{ matrix.tak_version }}
          PACKAGE_NAME="takserver-adsb-plugin-${VERSION}-tak${TAK_VERSION}"

          # Create dist directory
          mkdir -p build/dist/${PACKAGE_NAME}

          # Copy files
          cp build/libs/*-all.jar build/dist/${PACKAGE_NAME}/
          cp tak.server.plugins.AdsbPlugin.yaml build/dist/${PACKAGE_NAME}/

          # Create payload
          cd build/dist
          tar -czf payload.tar.gz ${PACKAGE_NAME}

          # Create self-extracting installer
          cat > "${PACKAGE_NAME}-installer.sh" << 'INSTALLER_SCRIPT'
          #!/bin/bash
          #
          # TAK Server ADS-B Plugin - Self-Extracting Installer
          # Copyright (c) 2025 Adeptus Cyber Solutions, LLC
          #

          set -e

          RED='\033[0;31m'
          GREEN='\033[0;32m'
          YELLOW='\033[1;33m'
          NC='\033[0m'

          TAK_HOME="${TAK_HOME:-/opt/tak}"

          echo "=========================================="
          echo "TAK Server ADS-B Plugin Installer"
          echo "Adeptus Cyber Solutions, LLC"
          echo "=========================================="
          echo

          if [ "$EUID" -ne 0 ]; then
              echo -e "${RED}ERROR: Please run as root or with sudo${NC}"
              exit 1
          fi

          if [ ! -d "$TAK_HOME" ]; then
              echo -e "${RED}ERROR: TAK Server directory not found at $TAK_HOME${NC}"
              exit 1
          fi

          echo "TAK Server Home: $TAK_HOME"
          echo

          TEMP_DIR=$(mktemp -d)
          trap "rm -rf $TEMP_DIR" EXIT

          echo "Extracting payload..."
          ARCHIVE_START=$(awk '/^__PAYLOAD_BELOW__$/{print NR + 1; exit 0; }' "$0")
          tail -n +${ARCHIVE_START} "$0" | tar -xzf - -C "$TEMP_DIR"

          EXTRACT_DIR=$(ls -d "$TEMP_DIR"/takserver-adsb-plugin-* 2>/dev/null | head -1)

          if [ -z "$EXTRACT_DIR" ] || [ ! -d "$EXTRACT_DIR" ]; then
              echo -e "${RED}ERROR: Failed to extract payload${NC}"
              exit 1
          fi

          echo -e "${GREEN}Extracted successfully${NC}"
          echo

          echo "Installing plugin JAR to $TAK_HOME/lib/..."
          cp "$EXTRACT_DIR"/*.jar "$TAK_HOME/lib/"
          echo -e "${GREEN}Done${NC}"

          CONFIG_DIR="$TAK_HOME/conf/plugins"
          CONFIG_FILE="$CONFIG_DIR/tak.server.plugins.AdsbPlugin.yaml"

          mkdir -p "$CONFIG_DIR"

          if [ -f "$CONFIG_FILE" ]; then
              echo -e "${YELLOW}Config file already exists, not overwriting: $CONFIG_FILE${NC}"
              cp "$EXTRACT_DIR/tak.server.plugins.AdsbPlugin.yaml" "${CONFIG_FILE}.new"
          else
              echo "Installing config file to $CONFIG_FILE..."
              cp "$EXTRACT_DIR/tak.server.plugins.AdsbPlugin.yaml" "$CONFIG_FILE"
              echo -e "${GREEN}Done${NC}"
          fi

          chown tak:tak "$TAK_HOME/lib/"*.jar 2>/dev/null || true
          chown -R tak:tak "$CONFIG_DIR" 2>/dev/null || true

          echo
          echo -e "${GREEN}Installation Complete!${NC}"
          echo
          echo "Next steps:"
          echo "  1. Edit config: sudo nano $CONFIG_FILE"
          echo "  2. Restart TAK Server: sudo systemctl restart takserver"
          echo

          exit 0

          __PAYLOAD_BELOW__
          INSTALLER_SCRIPT

          # Append payload
          cat payload.tar.gz >> "${PACKAGE_NAME}-installer.sh"
          chmod +x "${PACKAGE_NAME}-installer.sh"

          # Clean up
          rm -rf ${PACKAGE_NAME} payload.tar.gz

          cd ../..

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: installer-tak${{ matrix.tak_version }}
          path: build/dist/*-installer.sh

  release:
    needs: [bump-version, build]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Pull latest changes
        run: git pull origin main

      - name: Get version
        id: version
        run: |
          VERSION=$(grep "^version = " build.gradle | sed "s/version = '\(.*\)'/\1/")
          echo "version=${VERSION}" >> $GITHUB_OUTPUT

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: find artifacts -type f

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: Release v${{ steps.version.outputs.version }}
          body: |
            ## TAK Server ADS-B Plugin v${{ steps.version.outputs.version }}

            Injects real-time ADS-B aircraft data from airplanes.live API into TAK Server.

            ### Downloads

            Choose the installer matching your TAK Server version:
            - `takserver-adsb-plugin-${{ steps.version.outputs.version }}-tak5.4-installer.sh` - For TAK Server 5.4.x
            - `takserver-adsb-plugin-${{ steps.version.outputs.version }}-tak5.5-installer.sh` - For TAK Server 5.5.x
            - `takserver-adsb-plugin-${{ steps.version.outputs.version }}-tak5.6-installer.sh` - For TAK Server 5.6.x

            ### Installation

            ```bash
            chmod +x takserver-adsb-plugin-*-installer.sh
            sudo ./takserver-adsb-plugin-*-installer.sh
            ```

            ### Configuration

            Edit `/opt/tak/conf/plugins/tak.server.plugins.AdsbPlugin.yaml` to set your location.

            ---

            Copyright (c) 2025 Adeptus Cyber Solutions, LLC
          draft: false
          prerelease: false
          files: |
            artifacts/**/*-installer.sh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
