name: Bug Report
description: Report a problem with the ADS-B plugin
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report an issue. Please fill out the fields below so the problem can be reproduced.

  - type: dropdown
    id: tak_version
    attributes:
      label: TAK Server Version
      options:
        - "5.4"
        - "5.5"
        - "5.6"
        - Other (specify in additional context)
    validations:
      required: true

  - type: input
    id: plugin_version
    attributes:
      label: Plugin Version
      description: Found in the plugin JAR filename or TAK Server plugin manager (e.g. 1.0.4)
      placeholder: "1.0.4"
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: TAK Server OS
      options:
        - Ubuntu 20.04
        - Ubuntu 22.04
        - Rocky Linux 8
        - Rocky Linux 9
        - Other (specify in additional context)
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Configure plugin with radius = ...
        2. Start TAK Server
        3. ...
    validations:
      required: true

  - type: textarea
    id: config
    attributes:
      label: Plugin configuration (tak.server.plugins.AdsbPlugin.yaml)
      description: Paste your config file contents. Remove any sensitive values.
      render: yaml

  - type: textarea
    id: logs
    attributes:
      label: Relevant log output
      description: Paste relevant lines from `/opt/tak/logs/takserver-plugins.log`. Remove any sensitive values.
      render: text

  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Anything else that might be relevant (proxy setup, network restrictions, etc.)
