name: Feature Request
description: Suggest an improvement or new capability for the ADS-B plugin
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the suggestion! Please describe what you'd like to see and why it would be useful.

  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the use case or limitation you're running into.
      placeholder: "I'm trying to do X but the plugin currently doesn't support..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: Describe what you'd like the plugin to do differently or what new capability you want.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any other approaches you've thought about or tried?

  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Screenshots, links, references to similar tools, or anything else that helps explain the request.
